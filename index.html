<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geometrical dash</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Flap Challenge</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
text-align: center;
background-color: #0078d7; /* Agreed change: Windows Blue */
color: white;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}


/* The Button to "enable" audio for the prank */
#start-btn {
padding: 15px 30px;
font-size: 20px;
cursor: pointer;
background: #ffffff; /* Agreed change: White button */
color: #0078d7; /* Agreed change: Blue text */
border: none;
border-radius: 5px;
}


/* Fullscreen containers for the pranks */
.prank-overlay {
display: none;
position: fixed;
top: 0; left: 0;
width: 100vw; height: 100vh;
background: black;
z-index: 9999;
justify-content: center;
align-items: center;
}


video, img {
max-width: 100%;
max-height: 100%;
}

/* Agreed change: Windows-style loader */
.loader {
  width: 50px; height: 50px;
  border: 5px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%; border-top-color: #fff;
  animation: spin 1s ease-in-out infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    background: linear-gradient(#5cbcff, #0078d7);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  h1 {
    margin-bottom: 8px;
  }

  p {
    margin: 4px 0;
  }

  #start-btn {
    padding: 12px 24px;
    font-size: 18px;
    cursor: pointer;
    background: #ffffff;
    color: #0078d7;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    margin-top: 12px;
  }

  #game-container {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #game-canvas {
    background: linear-gradient(#8bd4ff, #4aa8e8);
    border: 3px solid white;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
  }

  #score {
    font-size: 20px;
    font-weight: 700;
  }

  .prank-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    z-index: 9999;
    justify-content: center;
    align-items: center;
  }

  video {
    max-width: 100%;
    max-height: 100%;
  }
</style>
</head>
<body>


<div id="main-content">
<h1>cube run</h1> <!-- Agreed change: Update text -->
<button id="start-btn">dash</button> <!-- Agreed change: Update button -->
</div>


<div id="rickroll-overlay" class="prank-overlay">
<video id="rick-video" playsinline>
<source src="https://shattereddisk.github.io/rickroll/rickroll.mp4" type="video/mp4">
</video>
</div>


<div id="custom-overlay" class="prank-overlay">
<img src="https://github.com/sharduldani77-hub/TompkinsTrove/blob/main/welsh.jpg?raw=true" alt="Custom Prank">

</div>

  <div id="main-content">
    <h1>Cube Flap Challenge</h1>
    <p>Press <strong>Space</strong> or click/tap to flap through the pipes.</p>
    <p>Reach <strong>25 points</strong> to win and unlock the video.</p>
    <button id="start-btn">Start Game</button>
  </div>

  <div id="game-container">
    <div id="score">Score: 0 / 25</div>
    <canvas id="game-canvas" width="420" height="600"></canvas>
    <p id="status">Avoid the pipes!</p>
  </div>

  <div id="rickroll-overlay" class="prank-overlay">
    <video id="rick-video" playsinline controls>
      <source src="https://shattereddisk.github.io/rickroll/rickroll.mp4" type="video/mp4">
    </video>
  </div>

<script>
const startBtn = document.getElementById('start-btn');
const rickOverlay = document.getElementById('rickroll-overlay');
const rickVideo = document.getElementById('rick-video');
const customOverlay = document.getElementById('custom-overlay');


startBtn.addEventListener('click', () => {
/* Agreed change: Computer updating screen content */
document.getElementById('main-content').innerHTML = `
    <div class="loader"></div>
    <h1>Working on updates</h1>
    <p>12% complete</p>
    <p style="font-size: 14px;">Don't turn off your PC. This will take a while.</p>
`;
startLoop();
});


function startLoop() {
// 1. Wait 5 seconds
setTimeout(() => {
showRickroll();
}, 500);
}


function showRickroll() {
rickOverlay.style.display = 'flex';
rickVideo.currentTime = 0;
rickVideo.play();


// 2. Show for 5 seconds, then hide
setTimeout(() => {
rickOverlay.style.display = 'none';
rickVideo.pause();


// 3. Wait 5 seconds, then show the image
setTimeout(() => {
showCustomImage();
}, 500);
}, 3000);
}


function showCustomImage() {
customOverlay.style.display = 'flex';


// 4. Show for 5 seconds, then hide
setTimeout(() => {
customOverlay.style.display = 'none';


// 5. Restart the loop (Wait 5s then Rickroll again)
startLoop();
}, 1500);
}
  const startBtn = document.getElementById('start-btn');
  const mainContent = document.getElementById('main-content');
  const gameContainer = document.getElementById('game-container');
  const scoreEl = document.getElementById('score');
  const statusEl = document.getElementById('status');
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const rickOverlay = document.getElementById('rickroll-overlay');
  const rickVideo = document.getElementById('rick-video');

  const gravity = 0.35;
  const flapPower = -6.3;
  const pipeWidth = 60;
  const gapHeight = 155;
  const pipeSpeed = 2.5;
  const spawnInterval = 92;
  const targetScore = 25;

  let bird;
  let pipes;
  let frameCount;
  let score;
  let gameRunning = false;
  let won = false;
  let animationId = null;

  function resetGame() {
    bird = {
      x: 90,
      y: canvas.height / 2,
      size: 28,
      velocity: 0
    };

    pipes = [];
    frameCount = 0;
    score = 0;
    gameRunning = true;
    won = false;

    scoreEl.textContent = `Score: ${score} / ${targetScore}`;
    statusEl.textContent = 'Game started! Flap to survive.';
  }

  function flap() {
    if (!gameRunning) return;
    bird.velocity = flapPower;
  }

  function spawnPipe() {
    const minTop = 70;
    const maxTop = canvas.height - gapHeight - 120;
    const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;

    pipes.push({
      x: canvas.width,
      topHeight,
      counted: false
    });
  }

  function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(cx, rx + rw));
    const closestY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - closestX;
    const dy = cy - closestY;
    return (dx * dx + dy * dy) < (r * r);
  }

  function update() {
    frameCount += 1;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    if (frameCount % spawnInterval === 0) {
      spawnPipe();
    }

    pipes.forEach(pipe => {
      pipe.x -= pipeSpeed;

      if (!pipe.counted && pipe.x + pipeWidth < bird.x) {
        pipe.counted = true;
        score += 1;
        scoreEl.textContent = `Score: ${score} / ${targetScore}`;

        if (score >= targetScore) {
          handleWin();
        }
      }
    });

    pipes = pipes.filter(pipe => pipe.x + pipeWidth > -20);

    const birdRadius = bird.size / 2;

    if (bird.y - birdRadius <= 0 || bird.y + birdRadius >= canvas.height) {
      gameOver();
      return;
    }

    for (const pipe of pipes) {
      const hitTop = circleRectCollision(
        bird.x,
        bird.y,
        birdRadius,
        pipe.x,
        0,
        pipeWidth,
        pipe.topHeight
      );

      const hitBottom = circleRectCollision(
        bird.x,
        bird.y,
        birdRadius,
        pipe.x,
        pipe.topHeight + gapHeight,
        pipeWidth,
        canvas.height - (pipe.topHeight + gapHeight)
      );

      if (hitTop || hitBottom) {
        gameOver();
        return;
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ground hint
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

    // Pipes
    ctx.fillStyle = '#2a7f20';
    pipes.forEach(pipe => {
      ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
      ctx.fillRect(pipe.x, pipe.topHeight + gapHeight, pipeWidth, canvas.height - (pipe.topHeight + gapHeight));

      ctx.fillStyle = '#43a33a';
      ctx.fillRect(pipe.x - 4, pipe.topHeight - 14, pipeWidth + 8, 14);
      ctx.fillRect(pipe.x - 4, pipe.topHeight + gapHeight, pipeWidth + 8, 14);
      ctx.fillStyle = '#2a7f20';
    });

    // Cube "bird"
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(Math.min(Math.max(bird.velocity * 0.05, -0.45), 0.45));
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-bird.size / 2, -bird.size / 2, bird.size, bird.size);
    ctx.fillStyle = '#0078d7';
    ctx.fillRect(-bird.size / 4, -bird.size / 4, bird.size / 2, bird.size / 2);
    ctx.restore();
  }

  function gameLoop() {
    if (!gameRunning) return;
    update();
    draw();
    animationId = requestAnimationFrame(gameLoop);
  }

  function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    cancelAnimationFrame(animationId);
    statusEl.textContent = 'You crashed! Press Start Game to try again.';
    mainContent.style.display = 'block';
    startBtn.textContent = 'Restart Game';
  }

  function handleWin() {
    if (won) return;
    won = true;
    gameRunning = false;
    cancelAnimationFrame(animationId);
    statusEl.textContent = 'You reached 25 points! Playing video...';
    showVideo();
  }

  function showVideo() {
    rickOverlay.style.display = 'flex';
    rickVideo.currentTime = 0;
    rickVideo.play().catch(() => {
      statusEl.textContent = 'Click the video to start playback.';
    });
  }

  startBtn.addEventListener('click', () => {
    mainContent.style.display = 'none';
    gameContainer.style.display = 'flex';
    rickOverlay.style.display = 'none';
    rickVideo.pause();
    resetGame();
    draw();
    gameLoop();
  });

  window.addEventListener('keydown', event => {
    if (event.code === 'Space') {
      event.preventDefault();
      flap();
    }
  });

  canvas.addEventListener('pointerdown', flap);
</script>


</body>
</html>
